# Self-heal responder.
#
# Listens for completed CI runs. On failure:
#   1. classify       — fetch upstream logs/artifacts, decide transient vs. real
#   2. retry-once     — if transient and attempt < 2, rerun failed jobs and stop
#   3. open-or-update-issue — dedupe by (workflow, branch, failed_job) and file/update
#   4. assign-copilot — hand the issue to the Copilot cloud agent (App token, not PAT)
#   5. circuit-breaker — after 3 attempts on the same branch, escalate to humans
#
# Loop-prevention: skip when the upstream run was triggered by the cloud agent itself.
# Permissions: minimum viable per job. No PATs anywhere.

name: Self-heal

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions: {}

env:
  UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id }}
  UPSTREAM_RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
  UPSTREAM_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
  UPSTREAM_RUN_URL: ${{ github.event.workflow_run.html_url }}
  UPSTREAM_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
  UPSTREAM_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
  UPSTREAM_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
  UPSTREAM_TRIGGERING_ACTOR: ${{ github.event.workflow_run.triggering_actor.login }}
  UPSTREAM_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
  UPSTREAM_EVENT: ${{ github.event.workflow_run.event }}

jobs:
  classify:
    name: classify failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Fail-fast filter: only failures, never react to our own bot, never react to PRs from forks.
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.triggering_actor.login != 'copilot-swe-agent[bot]' &&
      github.event.workflow_run.triggering_actor.login != 'github-actions[bot]'
    permissions:
      actions: read
      contents: read
    outputs:
      transient: ${{ steps.detect.outputs.transient }}
      failed_job_name: ${{ steps.detect.outputs.failed_job_name }}
      log_tail_b64: ${{ steps.detect.outputs.log_tail_b64 }}
      dedupe_key: ${{ steps.detect.outputs.dedupe_key }}
    steps:
      - name: Inspect failed jobs and logs
        id: detect
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const crypto = require('crypto');
            const runId = Number(process.env.UPSTREAM_RUN_ID);

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });

            const failed = jobs.find(j => j.conclusion === 'failure');
            const failedName = failed ? failed.name : 'unknown';
            core.info(`Failed job: ${failedName}`);

            // Pull logs (zip). Take last ~50 lines across the failed job log file(s).
            let logTail = '(no log content available)';
            try {
              const logsResp = await github.rest.actions.downloadWorkflowRunLogs({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
              });
              // logsResp.data is an ArrayBuffer of the zip. Decode minimally without external deps.
              const buf = Buffer.from(logsResp.data);
              // Heuristic: extract printable ASCII chunks; good enough for keyword detection + tail.
              const text = buf.toString('utf8').replace(/[^\x09\x0A\x0D\x20-\x7E]/g, '');
              const lines = text.split('\n').filter(l => l.trim().length > 0);
              logTail = lines.slice(-50).join('\n');
            } catch (err) {
              core.warning(`Could not download logs: ${err.message}`);
            }

            // Transient signature detection (conservative — false negatives preferred over false positives).
            const transientPatterns = [
              /\bECONNRESET\b/i,
              /\bETIMEDOUT\b/i,
              /\bnetwork is unreachable\b/i,
              /\b(could not resolve host|temporary failure in name resolution)\b/i,
              /\b429 too many requests\b/i,
              /\b5\d\d (server error|bad gateway|service unavailable|gateway timeout)\b/i,
              /\bthe runner has received a shutdown signal\b/i,
              /\bout of memory\b/i,
              /\bkilled\b.*\bsignal 9\b/i,
            ];
            const transient = transientPatterns.some(rx => rx.test(logTail));
            core.info(`Transient signature detected: ${transient}`);

            const dedupeRaw = `${process.env.UPSTREAM_WORKFLOW_NAME}|${process.env.UPSTREAM_HEAD_BRANCH}|${failedName}`;
            const dedupeKey = crypto.createHash('sha1').update(dedupeRaw).digest('hex').slice(0, 12);

            core.setOutput('transient', String(transient));
            core.setOutput('failed_job_name', failedName);
            core.setOutput('log_tail_b64', Buffer.from(logTail, 'utf8').toString('base64'));
            core.setOutput('dedupe_key', dedupeKey);

  retry-once:
    name: retry once if transient
    needs: classify
    # NOTE: workflow-level `env` is NOT available in job-level `if:` expressions —
    # must read run_attempt from the github context directly.
    if: needs.classify.outputs.transient == 'true' && github.event.workflow_run.run_attempt < 2
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: write
    steps:
      - name: Re-run failed jobs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            await github.rest.actions.reRunWorkflowFailedJobs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: Number(process.env.UPSTREAM_RUN_ID),
            });
            core.notice('Transient failure — re-ran failed jobs once.');

  open-or-update-issue:
    name: open or update tracking issue
    needs: classify
    # Open an issue when failure is non-transient OR when a transient retry has already run.
    # Use github context directly — workflow-level `env` is not visible in job `if:`.
    if: needs.classify.outputs.transient != 'true' || github.event.workflow_run.run_attempt >= 2
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    outputs:
      issue_number: ${{ steps.upsert.outputs.issue_number }}
      attempt_count: ${{ steps.upsert.outputs.attempt_count }}
      escalated: ${{ steps.upsert.outputs.escalated }}
    steps:
      - name: Checkout (need template)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Render issue body from template
        id: render
        env:
          WORKFLOW_NAME: ${{ env.UPSTREAM_WORKFLOW_NAME }}
          FAILED_JOB_NAME: ${{ needs.classify.outputs.failed_job_name }}
          HEAD_BRANCH: ${{ env.UPSTREAM_HEAD_BRANCH }}
          HEAD_SHA: ${{ env.UPSTREAM_HEAD_SHA }}
          RUN_NUMBER: ${{ env.UPSTREAM_RUN_NUMBER }}
          RUN_ATTEMPT: ${{ env.UPSTREAM_RUN_ATTEMPT }}
          RUN_URL: ${{ env.UPSTREAM_RUN_URL }}
          TRIGGERING_ACTOR: ${{ env.UPSTREAM_TRIGGERING_ACTOR }}
          DEDUPE_KEY: ${{ needs.classify.outputs.dedupe_key }}
          LOG_TAIL_B64: ${{ needs.classify.outputs.log_tail_b64 }}
        run: |
          set -euo pipefail
          # Decode log tail safely — never expand vars from log content.
          # The template uses a ~~~~ fence (4 tildes) so log content containing ``` cannot
          # break the markdown structure; no further sanitization required.
          LOG_TAIL="$(printf '%s' "$LOG_TAIL_B64" | base64 -d)"
          export LOG_TAIL

          # envsubst with an explicit allowlist — never substitute arbitrary $VAR from the log body.
          ALLOWED='${WORKFLOW_NAME} ${FAILED_JOB_NAME} ${HEAD_BRANCH} ${HEAD_SHA} ${RUN_NUMBER} ${RUN_ATTEMPT} ${RUN_URL} ${TRIGGERING_ACTOR} ${DEDUPE_KEY} ${LOG_TAIL}'
          envsubst "$ALLOWED" < .github/CI_FAILURE_TEMPLATE.md > /tmp/issue-body.md
          echo "body_path=/tmp/issue-body.md" >> "$GITHUB_OUTPUT"

      - name: Ensure self-heal labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Idempotent — `--force` updates colour/description if the label already
          # exists, otherwise creates it. Without these, `gh issue create --label`
          # fails on a fresh repo with "could not add label: '<name>' not found".
          gh label create self-heal              --color 0E8A16 --description "Tracking issue opened by the self-heal responder"        --force
          gh label create self-heal/attempt-1    --color FBCA04 --description "Self-heal: 1st auto-recovery attempt"                    --force
          gh label create self-heal/attempt-2    --color FBCA04 --description "Self-heal: 2nd auto-recovery attempt"                    --force
          gh label create self-heal/escalated    --color B60205 --description "Self-heal: circuit breaker tripped — human review needed" --force

      - name: Upsert issue + manage attempt labels + circuit breaker
        id: upsert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEDUPE_KEY: ${{ needs.classify.outputs.dedupe_key }}
          FAILED_JOB_NAME: ${{ needs.classify.outputs.failed_job_name }}
          HEAD_BRANCH: ${{ env.UPSTREAM_HEAD_BRANCH }}
          WORKFLOW_NAME: ${{ env.UPSTREAM_WORKFLOW_NAME }}
          RUN_URL: ${{ env.UPSTREAM_RUN_URL }}
          BODY_PATH: ${{ steps.render.outputs.body_path }}
        run: |
          set -euo pipefail

          # Embed the dedupe key as a quoted token so GitHub search treats it as a
          # title substring (NOT as a `key:` qualifier, which would be parsed as an
          # unknown qualifier and return zero results).
          DEDUPE_TOKEN="sh-${DEDUPE_KEY}"
          TITLE="[self-heal] ${WORKFLOW_NAME} failed: ${FAILED_JOB_NAME} on ${HEAD_BRANCH} (${DEDUPE_TOKEN})"

          # Search the literal token in title, scoped to open self-heal issues.
          existing="$(gh issue list \
            --state open \
            --label self-heal \
            --search "\"${DEDUPE_TOKEN}\" in:title" \
            --json number,labels \
            --jq '.[0] // empty')"

          if [ -z "$existing" ]; then
            # `gh issue create` does NOT support --json; parse the URL it prints.
            url="$(gh issue create \
              --title "$TITLE" \
              --body-file "$BODY_PATH" \
              --label self-heal \
              --label "self-heal/attempt-1")"
            num="${url##*/}"
            echo "issue_number=$num" >> "$GITHUB_OUTPUT"
            echo "attempt_count=1" >> "$GITHUB_OUTPUT"
            echo "escalated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          num="$(printf '%s' "$existing" | jq -r '.number')"
          # Count existing attempt-N labels.
          attempts="$(printf '%s' "$existing" | jq -r '[.labels[].name | select(startswith("self-heal/attempt-"))] | length')"
          next=$((attempts + 1))

          gh issue comment "$num" --body-file "$BODY_PATH"

          if [ "$next" -ge 3 ]; then
            # Strip prior attempt labels and escalate.
            for lbl in $(printf '%s' "$existing" | jq -r '.labels[].name | select(startswith("self-heal/attempt-"))'); do
              gh issue edit "$num" --remove-label "$lbl" || true
            done
            gh issue edit "$num" --add-label "self-heal/escalated"
            gh issue comment "$num" --body ":rotating_light: Circuit breaker tripped after ${next} attempts on \`${HEAD_BRANCH}\`. Not reassigning Copilot. CODEOWNERS, please review."
            echo "issue_number=$num" >> "$GITHUB_OUTPUT"
            echo "attempt_count=$next" >> "$GITHUB_OUTPUT"
            echo "escalated=true" >> "$GITHUB_OUTPUT"
          else
            gh issue edit "$num" --add-label "self-heal/attempt-${next}"
            echo "issue_number=$num" >> "$GITHUB_OUTPUT"
            echo "attempt_count=$next" >> "$GITHUB_OUTPUT"
            echo "escalated=false" >> "$GITHUB_OUTPUT"
          fi

  assign-copilot:
    name: assign Copilot cloud agent
    needs: open-or-update-issue
    if: needs.open-or-update-issue.outputs.escalated == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    steps:
      # Mint a short-lived (~1h) GitHub App installation token at runtime.
      # Inputs:
      #   vars.APP_ID         — public GitHub App ID (a repo/org variable, NOT a secret)
      #   secrets.APP_PRIVATE_KEY — the App's RSA private key (.pem contents)
      # The action signs a JWT with the private key, exchanges it for an
      # installation token narrowly scoped to the App's declared permissions
      # (issues:write + metadata:read), and exposes it as steps.app_token.outputs.token.
      # The token expires automatically and never needs rotation.
      #
      # We DO NOT keep a long-lived fallback secret: installation tokens expire
      # hourly, so any "stored token" would have to be a PAT, which violates
      # the no-PATs rule. If the App isn't wired up, we fail loudly so the
      # operator knows Copilot was not assigned.
      - name: Mint App installation token
        id: app_token
        uses: actions/create-github-app-token@67e27a7eb7db372a1c61a7f9bdab8699e9ee57f7 # v1.11.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Assign issue to Copilot
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ needs.open-or-update-issue.outputs.issue_number }}
        run: |
          set -euo pipefail
          # No checkout in this job (it has zero filesystem permissions), so
          # gh's git-based repo auto-detection fails. GH_REPO tells gh which
          # repo to act on without needing a working tree.
          #
          # The Copilot cloud agent's *display* login is "Copilot" but its
          # *actual* assignee handle is the bot login "copilot-swe-agent" —
          # passing "Copilot" to --add-assignee returns "'Copilot' not found".
          gh issue edit "$ISSUE_NUMBER" --add-assignee copilot-swe-agent

  metrics:
    name: emit metrics
    needs: [classify, open-or-update-issue]
    if: always() && needs.open-or-update-issue.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main

      - name: Append metrics event
        env:
          ISSUE_NUMBER: ${{ needs.open-or-update-issue.outputs.issue_number }}
          ATTEMPT_COUNT: ${{ needs.open-or-update-issue.outputs.attempt_count }}
          ESCALATED: ${{ needs.open-or-update-issue.outputs.escalated }}
          FAILED_JOB_NAME: ${{ needs.classify.outputs.failed_job_name }}
          DEDUPE_KEY: ${{ needs.classify.outputs.dedupe_key }}
        run: |
          set -euo pipefail
          mkdir -p metrics
          touch metrics/self-heal-events.jsonl
          jq -cn \
            --arg ts "$(date -u +%FT%TZ)" \
            --arg workflow "$UPSTREAM_WORKFLOW_NAME" \
            --arg branch "$UPSTREAM_HEAD_BRANCH" \
            --arg sha "$UPSTREAM_HEAD_SHA" \
            --arg run_url "$UPSTREAM_RUN_URL" \
            --arg run_attempt "$UPSTREAM_RUN_ATTEMPT" \
            --arg failed_job "$FAILED_JOB_NAME" \
            --arg dedupe_key "$DEDUPE_KEY" \
            --arg issue "$ISSUE_NUMBER" \
            --arg attempt_count "$ATTEMPT_COUNT" \
            --arg escalated "$ESCALATED" \
            '{ts:$ts, workflow:$workflow, branch:$branch, sha:$sha, run_url:$run_url, run_attempt:($run_attempt|tonumber), failed_job:$failed_job, dedupe_key:$dedupe_key, issue:($issue|tonumber? // null), attempt_count:($attempt_count|tonumber? // null), escalated:($escalated=="true")}' \
            >> metrics/self-heal-events.jsonl

      - name: Open metrics PR (first-party gh CLI only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="self-heal/metrics-${GITHUB_RUN_ID}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add metrics/self-heal-events.jsonl
          if git diff --cached --quiet; then
            echo "No metrics change to commit."
            exit 0
          fi
          git commit -m "chore(metrics): self-heal event for run ${UPSTREAM_RUN_ID}"
          git push origin "$branch"
          # Ensure the cosmetic `metrics` label exists. `self-heal` is already
          # created by the open-or-update-issue job; recreate it here as well
          # in case this metrics job runs first on a future failure path.
          gh label create self-heal --color 0E8A16 --description "Tracking issue opened by the self-heal responder" --force
          gh label create metrics   --color C5DEF5 --description "Automated metrics append PR"                       --force
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(metrics): self-heal event for run ${UPSTREAM_RUN_ID}" \
            --body "Automated metrics append. Safe to squash-merge." \
            --label self-heal \
            --label metrics
